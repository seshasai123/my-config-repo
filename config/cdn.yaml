kind: "CDN"
version: "1"

metadata:
  # Apply these rules to dev environments (sandbox dev is also "dev").
  # Later you can add "stage" and "prod" if you want:
  # envTypes: ["dev", "stage", "prod"]
  envTypes: ["dev"]

data:
  trafficFilters:
    rules:
      # 1) Block a specific path completely
      - name: block-path-block-me
        when:
          allOf:
            - reqProperty: tier
              matches: "author|publish"
            - reqProperty: path
              equals: "/block-me"
        action: block

      # 2) Log login/log-out requests on publish (no blocking, just log)
      - name: log-auth-requests
        when:
          allOf:
            - reqProperty: tier
              equals: "publish"
            - reqProperty: path
              in:
                - "/system/sling/login/j_security_check"
                - "/system/sling/logout"
        action: log

      # 3) Allow a specific IP on /internal, block everyone else
      #    3a. Block /internal by default
      - name: block-internal
        when:
          allOf:
            - reqProperty: tier
              equals: "publish"
            - reqProperty: path
              like: "/internal*"
        action: block

      #    3b. But allow trusted IP (allow has precedence over block)
      - name: allow-internal-from-office-ip
        when:
          allOf:
            - reqProperty: tier
              equals: "publish"
            - reqProperty: path
              like: "/internal*"
            - reqProperty: clientIp
              equals: "203.0.113.10"   # <-- replace with your office IP
        action: allow
